name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "**"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run tauri:build:win

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Upload NSIS EXE
        uses: actions/upload-artifact@v4
        with:
          name: time-tracker-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: ignore
